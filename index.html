<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldSMS AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🛡️ ShieldSMS AI</h1>

        <p class="subtitle">
            AI-Powered Scam & Spam SMS Detection System
        </p>

        <textarea id="message"
            placeholder="Paste an SMS message here..."></textarea>

        <div class="button-group">
            <button onclick="loadScamExample()">Load Scam Example</button>
            <button onclick="loadSafeExample()">Load Safe Example</button>
        </div>

        <button class="analyze-btn" onclick="analyzeSMS()">
            Analyze Message
        </button>

        <div id="result" class="result">
            Waiting for analysis...
        </div>

        <p class="footer">
            Built using HTML • CSS • JavaScript • AI Logic
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
